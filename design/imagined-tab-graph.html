<!doctype html>
<!--
  Revenant Browser — Tab Graph, finished-state preview
  Rendered 2026-04-18 via the imagine-if skill to anchor what "screen 03 completed" looks like.
  Not production code. A pixel reference for Operator.

  Aesthetic: Black Widow monochrome + crimson accent (#b91c1c), hexagonal vortex geometry,
  predatory spider-web of the research trail. Opera-GX polish, Ghost-in-Shell restraint.
-->
<html lang="en"><head>
<meta charset="utf-8">
<title>Revenant Tab Graph — finished state</title>
<style>
  :root {
    --bg-0: #0a0a0a;
    --bg-1: #141414;
    --bg-2: #1e1e1e;
    --text-0: #fcfcfc;
    --text-1: #a3a3a3;
    --text-2: #606060;
    --grid: rgba(255,255,255,0.03);
    --accent: #b91c1c;
    --accent-soft: rgba(185,28,28,0.18);
    --accent-glow: rgba(185,28,28,0.45);
  }
  html, body { margin: 0; background: var(--bg-0); color: var(--text-0); font-family: 'Space Grotesk', system-ui, sans-serif; }
  body {
    background:
      radial-gradient(1200px 800px at 50% 40%, rgba(185,28,28,0.06), transparent 60%),
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 32px 32px,
      var(--bg-0);
    min-height: 100vh;
    padding: 24px;
  }
  header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; letter-spacing: 0.06em; }
  .kicker { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; }
  h1 { font-family: 'Space Grotesk', serif; font-weight: 500; font-size: 22px; margin: 0; }
  .tag { color: var(--text-2); font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-left: auto; }
  svg { width: 100%; height: calc(100vh - 140px); display: block; }
  .edge { stroke: var(--text-2); stroke-width: 1; opacity: 0.45; fill: none; }
  .edge.active { stroke: var(--accent); opacity: 0.9; stroke-width: 1.5; filter: drop-shadow(0 0 4px var(--accent-glow)); }
  .node-hex { fill: var(--bg-1); stroke: var(--text-2); stroke-width: 1; transition: all 120ms ease; }
  .node.active .node-hex { fill: var(--bg-2); stroke: var(--accent); stroke-width: 1.5; filter: drop-shadow(0 0 6px var(--accent-glow)); }
  .node.parent .node-hex { stroke: rgba(252,252,252,0.2); }
  .node text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: var(--text-1); text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
  .node.active text { fill: var(--text-0); }
  .node .sub { font-size: 7px; fill: var(--text-2); }
  .node:hover .node-hex { stroke: var(--text-0); cursor: pointer; }
  .visit-bead { fill: var(--text-2); opacity: 0.55; }
  .edge-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: var(--text-2); text-anchor: middle; opacity: 0.65; }
  footer { position: fixed; bottom: 12px; left: 24px; right: 24px; display: flex; gap: 24px; color: var(--text-2); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; }
  footer .legend { display: inline-flex; align-items: center; gap: 6px; }
  footer .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  footer .ring { width: 10px; height: 10px; border: 1px solid var(--text-2); border-radius: 50%; }
  @keyframes pulse { 0%, 100% { opacity: .45 } 50% { opacity: .9 } }
  .edge.live { animation: pulse 3s ease-in-out infinite; }
  @keyframes orbit { to { stroke-dashoffset: -200; } }
  .edge.active { stroke-dasharray: 4 2; animation: orbit 18s linear infinite; }
</style></head><body>

<header>
  <div class="kicker">REV://graph · live</div>
  <h1><i>The research trail</i></h1>
  <div class="tag">14 tabs · 62 visits · ghost-reykjavik</div>
</header>

  <!-- nodes -->

  <g class="node parent" transform="translate(180,430)"><use href="#hex"/><text y="-2">REV://start</text><text y="9" class="sub">ghost · reykjavik</text></g>

  <!-- wallet -->

  <!-- etherscan -->
  <g class="node" transform="translate(810,400)"><use href="#hex"/><text y="-2">etherscan</text><text y="9" class="sub">0xA4f9</text></g>
  <!-- defi dashboard -->

  <!-- copilot context folder -->

</svg>

<footer>
  <span class="legend"><span class="ring"></span> closed</span>
  <span class="legend"><span class="dot"></span> active · arxiv.org/abs/2603.04921</span>
  <span class="legend">click a hex to switch tabs · drag to pan · wheel to zoom</span>
  <span style="margin-left:auto;">build 0.9.13 · ternary core online</span>

</body></html>
